meta:
    id: plan-14772c97
    track_id: trk-6456fe7d
    title: Agent Teams plugin integration
    description: |
        Wire HtmlGraph to Claude Code's experimental agent-teams feature. The hook declarations and Go handlers already exist, but they drop teammate metadata on the floor, the orchestrator skill has zero guidance on when to use teams, and there is no quality-gate teeth on the team lifecycle hooks. This plan closes those concrete gaps without speculative scope.
    created_at: "2026-04-11"
    status: draft
    created_by: claude-opus-4-6
    version: 3
design:
    problem: |
        Claude Code v2.1.32+ ships an experimental agent-teams feature (CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS=1) where independent Claude instances self-claim work from a shared task list and message each other directly. The HtmlGraph plugin has already declared TeammateIdle, TaskCreated, and TaskCompleted hooks in plugin/hooks/hooks.json and wired Go handlers in internal/hooks/missing_events.go — but those handlers silently discard the teammate_name, team_name, idle_reason, task_subject, and task_description fields that Claude Code emits in the JSON payload, because the CloudEvent struct in internal/hooks/runner.go has no place to put them. As a result: multiple teammates working on one feature look identical in the HtmlGraph step log, the TaskCreated handler records using EventCheckPoint as a fallback (because internal/models/enums.go has no EventTaskCreated constant), and the 871-line orchestrator-directives skill never tells the lead agent that agent teams exist as a delegation option. The hooks observe but cannot enforce — exit-code-2 blocking is documented and supported by Claude Code, but no handler uses it.
    goals:
        - '**Capture teammate metadata** — every TeammateIdle / TaskCreated / TaskCompleted event records teammate_name and team_name in the HtmlGraph events DB'
        - '**Restore event taxonomy** — TaskCreated logs as EventTaskCreated, not EventCheckPoint, so analytics queries can distinguish task creation from arbitrary checkpoints'
        - '**Surface attribution** — feature steps written by team task hooks identify which teammate owns each step, visible in `htmlgraph snapshot` and the dashboard'
        - '**Document the decision** — the orchestrator skill has a concrete `Agent Teams vs Subagents` section so the lead agent knows when (and when not) to spawn a team'
        - '**Optional quality teeth** — TaskCompleted gains an opt-in quality gate that can refuse completion via exit code 2 when the active feature''s quality gates fail'
    constraints:
        - Agent teams is **experimental** and gated on CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS=1 — the plugin must work for users who never enable it (no hard dependency)
        - 'The shared task list under ~/.claude/tasks/<team>/ is **not a stable API** — docs say `don''t edit by hand or pre-author it: your changes are overwritten`. Do not read or sync those files; rely on hook payloads only'
        - Subagent `skills:` and `mcpServers:` frontmatter fields are **not applied** when a subagent runs as a teammate — any agent definition we ship must work without those
        - Only **one team per session** and **no nested teams** — the plugin's existing `htmlgraph:execute` parallel skill keeps working unchanged; this plan does not try to convert it to a team
        - '**No session resume** with in-process teammates — quality-gate blocking must not strand a teammate that the user can never recover; default-off is required'
    approved: false
    comment: ""
slices:
    - id: feat-aatm0001
      num: 1
      title: Capture teammate metadata in CloudEvent
      what: |
        Extend the `CloudEvent` struct in internal/hooks/runner.go (lines 21-61) with five new optional fields: `TeammateName string`, `TeamName string`, `IdleReason string`, `TaskSubject string`, `TaskDescription string`. Tag them with the exact JSON keys from the docs (`teammate_name`, `team_name`, `idle_reason`, `task_subject`, `task_description`). Update internal/hooks/missing_events.go so TeammateIdle, TaskCreated, and TaskCompleted handlers read from the typed fields instead of poking into TaskData. Persist teammate_name and team_name to the events DB row for every team-related event.
      why: |
        Foundation for every other slice. Today the JSON payload is parsed into CloudEvent and the team-specific fields are silently dropped. Without them, attribution, blocking, and analytics are all impossible.
      files:
        - internal/hooks/runner.go
        - internal/hooks/missing_events.go
        - internal/hooks/runner_test.go
      deps: []
      done_when:
        - CloudEvent struct has TeammateName, TeamName, IdleReason, TaskSubject, TaskDescription fields with correct JSON tags
        - TeammateIdle handler records TeammateName and IdleReason in the event details (not just `Teammate agent went idle`)
        - TaskCreated and TaskCompleted handlers read TaskSubject from the typed field, not TaskData["subject"]
        - A unit test feeds a sample agent-teams JSON payload through CloudEvent unmarshaling and asserts every field is captured
      effort: S
      risk: Low
      tests: |
        Unit: TestCloudEvent_AgentTeamsPayload — feed JSON payload from docs (with teammate_name, team_name, idle_reason, task_subject) through json.Unmarshal into CloudEvent, assert all five new fields populated.
        Unit: TestTeammateIdle_RecordsTeammateName — fake event with teammate_name="implementer", assert recorded event details contain "implementer".
        Regression: existing missing_events_test.go tests still pass — TaskData fallback path preserved for non-team callers.
      approved: false
      comment: ""
    - id: feat-aatm0002
      num: 2
      title: Add EventTaskCreated model constant
      what: |
        Add `EventTaskCreated` constant to internal/models/enums.go alongside the existing EventTeammateIdle (line 141) and EventTaskCompleted (line 142). Update the TaskCreated handler in internal/hooks/missing_events.go to use the new constant instead of falling back to EventCheckPoint. Add the new event to any switch statements / event filters that enumerate event types (find via grep for EventTaskCompleted).
      why: |
        Today TaskCreated events look identical to manual checkpoints in analytics queries. Filtering, dashboards, and velocity calculations conflate them. Tiny fix, high signal-to-noise.
      files:
        - internal/models/enums.go
        - internal/hooks/missing_events.go
      deps: []
      done_when:
        - EventTaskCreated constant defined in enums.go with the same convention as EventTaskCompleted
        - TaskCreated handler uses EventTaskCreated instead of EventCheckPoint
        - grep finds zero callers using EventCheckPoint as a TaskCreated fallback
      effort: S
      risk: Low
      tests: |
        Unit: TestTaskCreated_UsesCorrectEventType — call handler, query DB, assert event_type='task_created'.
        Regression: any existing test that filters on EventCheckPoint still passes (no false positives from removed fallback).
      approved: false
      comment: ""
    - id: feat-aatm0003
      num: 3
      title: Teammate attribution on feature steps
      what: |
        Modify `addTaskStep` and `completeTaskStep` in internal/hooks/missing_events.go to accept and persist a teammate_name parameter. When the active feature receives a step from a team task hook, the step text/metadata identifies which teammate owns it (e.g. step note becomes `[implementer] <task subject>`). Plumb through to whatever step storage layer the feature HTML uses (find via reading missing_events.go). Surface in `htmlgraph snapshot` output and the dashboard feature view.
      why: |
        Multiple teammates working on one feature is the central use case for agent teams in HtmlGraph. Without attribution, the step log is unusable — you can't tell who is doing what. This is the dogfooding payoff.
      files:
        - internal/hooks/missing_events.go
        - internal/dashboard/feature_view.go
        - cmd/htmlgraph/snapshot.go
      deps:
        - 1
      done_when:
        - addTaskStep and completeTaskStep accept teammateName string parameter
        - Step text/metadata persisted with teammate prefix or dedicated field
        - '`htmlgraph snapshot` shows teammate name next to recent task steps'
        - Dashboard feature view renders teammate attribution
        - When teammate_name is empty (non-team subagent), behavior is unchanged
      effort: M
      risk: Med
      tests: |
        Unit: TestAddTaskStep_WithTeammate — call with teammateName="reviewer", assert step persisted with attribution.
        Unit: TestAddTaskStep_NoTeammate — call with empty teammateName, assert legacy format preserved.
        Integration: end-to-end TaskCreated event with teammate_name → snapshot output contains teammate name.
      approved: false
      comment: ""
    - id: feat-aatm0004
      num: 4
      title: Opt-in quality gate on TaskCompleted
      what: |
        Add a new internal/hooks/quality_gate.go that runs the project's detected quality gate (go build/vet/test for go.mod, npm test for package.json, etc.) when called. Modify TaskCompleted handler in internal/hooks/missing_events.go to invoke it ONLY when an opt-in flag is set in the project config (e.g. `.htmlgraph/config.json` key `block_task_completion_on_quality_failure: true`). On failure, the handler exits with code 2 and writes a stderr message naming the failed gate. Default off.
      why: |
        The docs explicitly support exit-code-2 blocking on TaskCompleted. This converts HtmlGraph from a passive observer of team activity into an enforcer of quality gates — a teammate cannot mark a task done with broken builds. Default-off respects the no-session-resume caveat.
      files:
        - internal/hooks/quality_gate.go
        - internal/hooks/missing_events.go
        - internal/config/config.go
        - internal/hooks/quality_gate_test.go
      deps:
        - 1
      done_when:
        - quality_gate.go detects project type from manifest files (go.mod, package.json, pyproject.toml, Cargo.toml)
        - 'Returns structured result: {passed bool, gate_name string, output string}'
        - TaskCompleted handler reads opt-in flag from config; when off, behavior unchanged
        - When on AND gate fails, handler exits with code 2 and stderr names the failed gate
        - When on AND gate passes, handler proceeds with existing completeTaskStep flow
        - Documented in plugin README + agent-teams section of orchestrator skill
      effort: M
      risk: Med
      tests: |
        Unit: TestQualityGate_DetectsGoProject — fake go.mod, assert correct command list.
        Unit: TestTaskCompleted_OptInOff_NeverBlocks — flag off, even with broken build, exits 0.
        Unit: TestTaskCompleted_OptInOn_BlocksOnFailure — flag on, fake failing gate, asserts exit code 2 and stderr message.
        Regression: TestTaskCompleted_NoFlag_LegacyBehavior — handler with no config still records the event.
      approved: false
      comment: ""
    - id: feat-aatm0005
      num: 5
      title: Orchestrator skill — Agent Teams section
      what: |
        Add a new section to plugin/skills/orchestrator-directives-skill/SKILL.md titled `Agent Teams vs Subagents` covering: (1) decision criteria — use teams for parallel ownership / competing hypothesis debugging / multi-lens code review, use subagents for sequential delegation; (2) opt-in via CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS=1 and minimum Claude Code version 2.1.32; (3) how to spawn — natural language `Create an agent team to ...` (no SDK API); (4) caveats: subagent `skills:` and `mcpServers:` frontmatter NOT applied to teammates, no session resume, one team per session, no nested teams; (5) three concrete example prompts mapped to HtmlGraph use cases (multi-lens PR review, competing-hypothesis debug, feature ownership splitting); (6) what HtmlGraph does in response — records events with teammate attribution, optionally enforces quality gates.
      why: |
        The orchestrator skill is 871 lines and mentions agent teams zero times. Without this section the lead agent will never reach for teams when they would actually help, and the rest of the slices have no consumer.
      files:
        - plugin/skills/orchestrator-directives-skill/SKILL.md
      deps: []
      done_when:
        - New section added under existing delegation guidance
        - Decision criteria stated in a small table
        - Env var + version requirement quoted exactly
        - Three example prompts shown verbatim
        - Caveats list includes the skills/mcpServers limitation and no-resume warning
        - Section is under 150 lines (the skill is already large)
      effort: S
      risk: Low
      tests: |
        Unit: none (documentation).
        Integration: manual smoke — invoke /htmlgraph:orchestrator-directives-skill and verify the new section renders.
        Regression: skill loads without YAML frontmatter errors; existing sections untouched.
      approved: false
      comment: ""
    - id: feat-aatm0006
      num: 6
      title: User-facing docs + opt-in instructions
      what: |
        Update AGENTS.md and plugin/README.md (or equivalent install doc) with a short section on enabling agent teams alongside HtmlGraph: env var, version requirement, what HtmlGraph captures (teammate attribution, task lifecycle events), how to opt into the quality gate (config key from slice 4), and the experimental-feature warning. One paragraph each, links to upstream docs.
      why: |
        The hook handlers and skill guidance are invisible without user-facing docs. New HtmlGraph users should be able to discover the feature without reading source.
      files:
        - AGENTS.md
        - plugin/README.md
      deps:
        - 4
        - 5
      done_when:
        - AGENTS.md mentions agent-teams support in one short paragraph with env var and version
        - plugin/README.md (or chosen doc) has a step-by-step opt-in section
        - Both link to https://code.claude.com/docs/en/agent-teams
        - Both note the quality-gate config key is opt-in
      effort: S
      risk: Low
      tests: |
        Unit: none (documentation).
        Manual: render markdown in dashboard / GitHub preview, verify links resolve.
      approved: false
      comment: ""
questions:
    - id: q-env-flag-default
      text: Should the HtmlGraph plugin auto-set CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS=1, or require explicit user opt-in?
      description: |
        Auto-setting the flag in plugin settings.json would make the hooks immediately useful for every HtmlGraph user, but it forces an experimental, one-team-per-session, no-nested-teams constraint on users who may never want it. Opt-in keeps HtmlGraph backward-compatible and respects the experimental status of the upstream feature, but means most users never discover the integration. The hooks already no-op gracefully when no team is active, so auto-set is technically safe — the question is whether it's polite.
      recommended: opt-in
      options:
        - key: auto-set
          label: 'Auto-set: plugin settings.json sets the env var; users get teams immediately, with the experimental constraints they did not ask for'
        - key: opt-in
          label: 'Opt-in: docs explain how to set the flag; HtmlGraph captures team events when present but stays passive otherwise (recommended — respects experimental status)'
        - key: prompt-on-first-run
          label: 'Prompt on first run: SessionStart hook detects missing flag and asks once via stderr — clever but adds startup noise to every session'
      answer: null
    - id: q-quality-gate-mode
      text: How aggressive should the TaskCompleted quality gate be?
      description: |
        Slice 4 adds an exit-code-2 blocking quality gate, but blocking has a sharp edge: in-process teammates cannot be resumed via /resume, so a blocked teammate that the user can't fix immediately is stranded. Always-block is safest for code quality but harshest for UX. Configurable-default-warn lets users opt into blocking once they trust the gate. Warn-only means the gate is purely advisory and the slice is much simpler. Skipping the slice entirely defers the work.
      recommended: configurable-default-warn
      options:
        - key: always-block
          label: 'Always block: every team using HtmlGraph gets enforced gates; harshest UX, may strand teammates'
        - key: configurable-default-warn
          label: 'Configurable, default warn: opt-in to blocking via config key; warns by default (recommended — trades immediate teeth for safety)'
        - key: warn-only
          label: 'Warn-only: gate runs and logs failures but never blocks; simpler implementation, no risk of stranding'
        - key: skip-slice
          label: 'Skip slice 4 entirely: defer quality gate work to a follow-up plan once we have field experience with team events'
      answer: null
    - id: q-task-list-sync
      text: Should we attempt to sync the team's shared task list (~/.claude/tasks/<team>/) into HtmlGraph work items?
      description: |
        The richest possible integration would let HtmlGraph see every task in a team's shared list, mirror them as work items, and show cross-teammate dependencies in the dashboard. But the docs explicitly warn against reading or pre-authoring those files: `Claude Code generates both automatically — don't edit by hand or pre-author it: your changes are overwritten on the next state update`. The format is undocumented and unstable. A spike to reverse-engineer the schema is possible but risks breakage on every upstream version bump.
      recommended: defer
      options:
        - key: implement-now
          label: 'Implement now: read ~/.claude/tasks/<team>/ in a SessionStart-driven sync — fragile, schema may change'
        - key: spike-to-document
          label: 'Spike: investigate the file format, write findings to a research note, decide later — adds scope without payoff'
        - key: defer
          label: 'Defer: rely entirely on TaskCreated/TaskCompleted hook payloads (which ARE documented) for visibility (recommended — durable contract)'
      answer: null
    - id: q-attribution-surface
      text: How should teammate attribution appear on feature steps in slice 3?
      description: |
        Slice 3 needs to show which teammate owns each step. Step text is simplest — prefix the step note with `[teammate-name]` and we're done, no schema change. A new dedicated step field is cleaner structurally but requires migrating the feature step schema and updating snapshot/dashboard rendering. A new dashboard panel is richest but biggest scope.
      recommended: step-text-only
      options:
        - key: step-text-only
          label: 'Step text prefix: `[implementer] <subject>` — zero schema change, immediate visibility (recommended)'
        - key: new-step-field
          label: 'New TeammateName field on step: structurally clean, requires schema migration and renderer updates'
        - key: new-dashboard-panel
          label: 'Dedicated `Teammate Activity` dashboard panel: richest UX, largest scope, deferred to follow-up'
      answer: null
