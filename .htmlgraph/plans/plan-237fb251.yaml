meta:
    id: plan-237fb251
    track_id: trk-cb36e595
    title: Multi-Project Hardening — per-project process isolation
    description: Re-architect `htmlgraph serve --global` from shared-process query-param dispatch to per-project child-process reverse-proxy isolation. Closes the architectural flaw where project-scoped writes route through the global server's read-only cache with wrong CWD / env / hook context, enabling accidental cross-project contamination. Each active project runs in its own `htmlgraph serve` child process on a 127.0.0.1 ephemeral port; the global server serves only aggregate reads and reverse-proxies `/p/<project-id>/*` to the matching child. OS-level process isolation; correct-by-construction hook context; crash isolation; composes cleanly with the `(session_id, agent_id)` attribution fix by giving each project its own writer queue.
    created_at: "2026-04-09"
    status: draft
    created_by: claude-opus
    version: 4
design:
    problem: |-
        `cmd/htmlgraph/serve_global.go` holds a `projectCache` of read-only `*sql.DB` handles to every registered project and dispatches project-scoped routes (`/api/plans/*`, `/api/plans/<id>/chat`, `/api/plans/<id>/delete`, `/api/plans/<id>/render`, `/api/graph`, `/api/sessions`, `/api/features/*`, `/api/transcript`, `/api/events/tree`, `/api/events/subagent`) via `dispatchByProject(?project=<id>)`. The handlers then receive a read-only DB opened in the global server's working directory with the global server's env. Any write — plan chat streaming, plan finalize, plan delete, feature state transitions, hook-driven mutations — runs with the wrong CWD, wrong `HTMLGRAPH_PROJECT_DIR`, wrong `.htmlgraph/` attribution, and a SQLite handle that was explicitly opened `mode=ro`.

        Two concrete consequences surfaced during smoke testing on 2026-04-09:
        1. `POST /api/plans/plan-368a5cd2/chat` returned HTTP 400 because the embedded plan template hardcodes `/api/plans/<id>/chat` with no `?project=` and `dispatchByProject` demands it. The band-aid fix (inject `?project=` into the template) was rejected because it papers over the symptom while leaving the architecture exposed.
        2. A successfully-routed write (hypothetically) against `/api/plans/<id>/finalize?project=A` would: open a read-only DB to project A (SQLite errors on write), but first try to run hooks under the global server's CWD and env, attributing to the wrong project's session tables, writing event files to the wrong `.htmlgraph/` directory, and shelling out `claude` subprocesses under the wrong project context. The router has zero enforcement of which project a given write belongs to — the query param is a hint, not a boundary.

        The existing implementation also forces every frontend fetch call site to remember to append `?project=`. Today `buildProjectUrl` in `dashboard/js/helpers.js` covers 18+ call sites; the plan template's hardcoded URLs bypass it entirely. Future components that forget the helper will silently break or, worse, cross-route.
    goals:
        - '**Process isolation** — each active project runs in its own `htmlgraph serve` child process with its own OS heap, env vars, CWD, SQLite connection pool, and hook context. A memory bug, held-wrong-pointer, or router confusion cannot leak state across projects because the kernel enforces the boundary.'
        - '**Global server holds zero SQLite handles** — the global process never opens any project''s SQLite database, not even read-only. All database access happens inside child processes bound to their own project directory. The landing page reads only from the registry JSON file; per-project data is served by the corresponding child via `/p/<id>/api/*` proxy. This is grep-enforceable: `grep -rn ''sql.Open\|sqlx.Open\|dbpkg.Open\|registry.OpenReadOnly'' cmd/htmlgraph/serve_global.go` must return zero matches.'
        - '**Single user-facing origin** — the user still sees one dashboard on `http://localhost:8087/`. Drilling into a project navigates to `/p/<project-id>/` which the global server reverse-proxies to the matching child. All per-project views, plans, events, and graphs share the same origin under the `/p/<id>/` prefix.'
        - '**Correct-by-construction hook context** — children are spawned with `--project-dir <path>`, resolved by `internal/paths/resolve.go` as the highest-priority source. All `.htmlgraph/` writes, hook events, and subprocess invocations automatically attribute to the right project with zero per-handler coordination.'
        - '**Zero frontend ceremony** — the plan template, feature detail pages, and any future embedded view receive their project context via a template-injected `window.htmlgraphPlanBase` variable (set by the child''s render path, not the global server). No `?project=` anywhere in user-facing code. `buildProjectUrl` becomes a one-line helper that branches on `window.location.pathname.startsWith(''/p/'')`.'
        - '**Architectural acceptance test** — an integration test creates two temp projects, writes feature X to projectA through `/p/A/api/workitem/create`, and asserts projectB''s SQLite file on disk does NOT contain feature X. Cross-project contamination becomes impossible at the boundary, not merely absent by inspection.'
    constraints:
        - Single binary, single entry point — `htmlgraph serve --global` spawns children of the same binary via `os.Executable()`. No new CLI tool, no separate release artifact.
        - Children bind `127.0.0.1:0` — kernel assigns a free ephemeral port. Parent reads the bound port back via a stdout handshake line before routing any requests. Must not require pre-allocation or config.
        - Crash isolation is bidirectional — a panic in child A must not affect child B, and the global server must return 502 (not hang) when a child is dead. The next request to that project respawns.
        - Idle reaping required — children older than a configurable idle timeout (default 30 min) are SIGTERMed to prevent process leaks over long dashboard sessions.
        - Zombie prevention on parent shutdown — when the global server receives SIGINT/SIGTERM, it must SIGTERM all children, wait up to 5s for graceful exit, then SIGKILL survivors. No orphan processes after `Ctrl+C`.
        - All cross-project access in the global layer is read-only. The aggregate handlers (`/api/projects/all/stats`, `/api/events/stream`, `/api/events/recent`) may open foreign project DBs in `?mode=ro` mode for aggregation but MUST NOT call any handler that performs writes. This is the only architectural rule that cannot be relaxed.
        - Single-project `htmlgraph serve` (no `--global`) behavior is unchanged. The refactor extracts a mux factory that both paths share; the single-project entry point continues to bind a fixed port and serve directly with no parent.
        - '`active_work_items(session_id, agent_id)` attribution (feat-ab67561e) composes cleanly — each child has its own `sessions` table and its own writer queue, so there is no cross-project SQLite contention by construction. The attribution fix applies per-project without further changes.'
        - Supports macOS and Linux. Windows is not a target for this work — process lifecycle differs (`pdeathsig` Linux, `ProcessMonitor` macOS, Job Objects Windows) and Windows support can be filed separately if needed.
        - Child must emit the port handshake line as its FIRST stdout output. After the handshake, child stdout and stderr must be redirected to a per-project log file at `.htmlgraph/logs/serve-<port>.log` to prevent the parent's pipe reader from blocking on subsequent prints.
        - '`--project-dir` is a persistent flag on the root command, not on the `serve` subcommand. Child spawn arg order is fixed: `[binary, --project-dir, <path>, serve, --port, 0]`. Wrong order causes cobra to reject the flag at runtime.'
        - SQLite WAL mode must be explicitly enabled on both the parent's read-only aggregate connections (mode=ro) and the child's read-write connection. Without WAL on both sides, concurrent readers block writers. Audited and enforced as part of slice 4.
        - Only one `htmlgraph serve --global` process per host. Two global servers would race on ephemeral port allocation and leave orphaned children on crash. Documented limitation; optional future work to enforce via a lockfile at `~/.htmlgraph/global-server.lock`.
        - Process isolation is at the kernel boundary, not at the access-control layer. The global server has no auth today and this work does not add any. A user with HTTP access to the global server can reach `/p/<any-registered-project>/` — the architectural guarantee is 'no cross-project contamination', not 'project-level access control'.
        - On macOS there is no `prctl(PR_SET_PDEATHSIG)` equivalent. Child processes use a 5-second heartbeat goroutine that checks the parent PID and exits if the parent is gone. Linux uses pdeathsig directly. Orphan cleanup on parent SIGKILL is best-effort.
        - 'Cross-project analytics are explicitly out of scope for this MVP. The landing page is a pure doorway: it lists registered projects from `~/.local/share/htmlgraph/projects.json` showing name, path, git remote, and last-seen timestamp. It does NOT show per-project work-item counts, live event streams, or aggregate statistics. These are deferred to a Phase 2 feature (tracked separately) that will design the cross-project analytics story intentionally rather than inheriting it from the MVP.'
        - The global server holds ZERO SQLite connections — no `aggregateCache`, no `projectCache`, no lazy read-only reads. Every database access in `htmlgraph serve --global` happens inside a child process bound to a single project's directory. This invariant is verified by grep in the slice 4 done_when and by an automated test that inspects the global server's DB handle count via reflection or instrumentation.
    approved: false
    comment: ""
slices:
    - id: feat-a1c5e301
      num: 1
      title: Extract buildSingleProjectMux factory + ephemeral port support
      what: 'Refactor `cmd/htmlgraph/serve.go:runServer` into a factory + entry point. Extract `buildSingleProjectMux(db *sql.DB, htmlgraphDir string) *http.ServeMux` — note the 2-argument signature; `dashboardFS` is a package-level //go:embed var accessed via `dashboardSub()` in `dashboard.go` and does NOT need to be passed in (feasibility critic A7). The factory registers every route currently in `runServer` but does not start the HTTP server or launch background goroutines. Replace `http.ListenAndServe(addr, mux)` with `net.Listen("tcp", listenAddr) + (&http.Server{Handler: mux}).Serve(ln)` so the bound `*net.TCPListener` is readable before `Serve` blocks. When the `--port` flag is `0`, read the assigned port via `ln.Addr().(*net.TCPAddr).Port` and print `htmlgraph-serve-ready port=<N> pid=<PID>\n` to stdout EXACTLY ONCE before calling `Serve`. This handshake line MUST be the first stdout write of the process — no startup logs, no deprecation warnings, nothing — or the supervisor''s line scanner will corrupt. Immediately after printing the handshake, redirect `os.Stdout` and `os.Stderr` to a per-project log file at `<htmlgraphDir>/logs/serve-<port>.log` (create the logs/ dir if absent). Fix the `autoIngestOnce` function (NOT `autoIngestLoop` — feasibility critic A2) at serve.go:246 to accept an explicit `htmlgraphDir` parameter; it currently calls `os.Getwd()` at lines 249 (for `projectFilter`) and 309 (for `.launch-mode`) — both call sites must be replaced with the passed-in dir. The calling signature of `autoIngestLoop` changes to accept `htmlgraphDir` and propagate it into `autoIngestOnce`.'
      why: Every downstream slice depends on being able to spawn a child as `htmlgraph serve --port 0 --project-dir <path>` and receive the assigned port back. Without the factory extraction and the ephemeral-port refactor, there is no way to run the per-project server logic inside a child process that the parent can reverse-proxy to. `autoIngestLoop` reading `os.Getwd()` is a pre-existing bug that would silently corrupt child attribution; fixing it as part of this slice keeps the blast radius contained to one commit.
      files:
        - cmd/htmlgraph/serve.go
        - cmd/htmlgraph/serve_test.go
      deps: []
      done_when:
        - '`buildSingleProjectMux(db, htmlgraphDir)` is a 2-arg package-level factory function returning `*http.ServeMux`'
        - '`runServer` uses `net.Listen` + `http.Server{}.Serve(ln)` instead of `http.ListenAndServe`'
        - Passing `--port 0` prints `htmlgraph-serve-ready port=<N> pid=<PID>` as the FIRST stdout write of the process
        - After the handshake line, child stdout and stderr are redirected to `<htmlgraphDir>/logs/serve-<port>.log`
        - Passing a fixed `--port` value (e.g. `--port 8080`) behaves exactly as today — no handshake line, stdout not redirected, same log output
        - '`autoIngestOnce` takes an explicit `htmlgraphDir` parameter and no longer calls `os.Getwd()` at line 249 or 309'
        - '`autoIngestLoop` signature accepts `htmlgraphDir` and forwards it to `autoIngestOnce`'
        - 'Single-project smoke test: `htmlgraph serve --port 8080` starts, dashboard loads, `/api/mode` returns single-mode JSON — unchanged from main'
        - 'Ephemeral smoke test: `htmlgraph --project-dir <tmp> serve --port 0` (note: persistent flag BEFORE subcommand) prints the handshake line, binds an ephemeral port, creates logs/serve-<N>.log, serves `/api/mode`'
        - '`go build ./... && go vet ./... && go test ./...` all pass'
      effort: M
      risk: Med
      tests: |
        Unit:
          - TestBuildSingleProjectMux_RegistersAllRoutes — construct the mux via the factory with a tmpdir DB, assert every current route in serve.go is registered
          - TestRunServer_EphemeralPort — start server with --port 0, capture stdout, assert handshake line appears, assert port is reachable via net.Dial
          - TestRunServer_FixedPort_NoHandshake — start with --port <fixed>, assert no handshake line, assert existing behavior unchanged
          - TestAutoIngestLoop_HonorsProjectDir — call with an explicit htmlgraphDir, assert ingest targets that dir not os.Getwd()
        Integration:
          - end-to-end: start server with --port 0 in a tmpdir project, read handshake, curl /api/mode, curl /api/projects, assert responses
        Regression:
          - existing cmd/htmlgraph tests must still pass unchanged
      approved: false
      comment: ""
    - id: feat-b2d6f412
      num: 2
      title: internal/childproc package — spawn, handshake, lifecycle, reap
      what: 'New package `internal/childproc/` with `childproc.go` + `childproc_test.go`. Define `type Child struct { ID string; ProjectDir string; Port int; PID int; cmd *exec.Cmd; LastRequest atomic.Int64; cancel context.CancelFunc; exitC chan struct{}; proxy *httputil.ReverseProxy }`. Define `type Supervisor struct { mu sync.Mutex; children map[string]*Child; spawnGroups map[string]*sync.Once; binPath string; idleTimeout time.Duration; spawnTimeout time.Duration }` with per-project `sync.Once` to handle concurrent cold-spawn requests without herd contention on the main mutex. Implement `NewSupervisor(opts Options) *Supervisor` with `binPath = os.Executable()` by default. Implement `(*Supervisor) GetOrSpawn(ctx context.Context, projectID, projectDir string) (*Child, error)` which spawns via `exec.CommandContext(cancelCtx, s.binPath, "--project-dir", projectDir, "serve", "--port", "0")`. **The arg order is load-bearing**: `--project-dir` is a persistent flag on the root cobra command (main.go:37) and must appear BEFORE the `serve` subcommand, not after, or cobra rejects it (feasibility critic A8). Capture stdout via `cmd.StdoutPipe()`, call `cmd.Start()`, launch a goroutine that scans stdout with `bufio.Scanner` for exactly one line matching `htmlgraph-serve-ready port=<N> pid=<PID>` with a 5s deadline. After the handshake, the scanner goroutine drains the pipe into `io.Discard` forever so the child doesn''t block — though the child should have already redirected its own stdout to a log file per slice 1''s requirement. Populate `Child.Port` and `Child.proxy` (pre-built `httputil.NewSingleHostReverseProxy` pointed at `http://127.0.0.1:<port>` with `FlushInterval = 100 * time.Millisecond` for SSE), and return. Second goroutine per child calls `cmd.Wait()`, closes `exitC`, removes from the map under the mutex. Implement `Shutdown(ctx)` which SIGTERMs all children in parallel, waits with deadline, SIGKILLs survivors. Implement `RunIdleReaper(ctx)` ticking every 60s. The closest prior-art pattern is `internal/planchat/backend.go:174` (exec.CommandContext + StdoutPipe + Start + scan + Wait) — model the scanner goroutine after it. Use `os.Executable()` not `os.Args[0]` (plan_cmds.go:268 uses os.Args[0] which is wrong for moved binaries / symlinks).'
      why: 'The supervisor is the isolation boundary. All OS-level process concerns live in one place: spawning, port handshake parsing, crash detection, idle reaping, zombie prevention on shutdown. Isolating this behind a clean interface lets slice 3''s reverse-proxy layer ignore process-level concerns and lets tests verify lifecycle in isolation. Using `os.Executable()` guarantees version parity between parent and child (no PATH resolution, no split-binary installs) and plays well with `go test` (tests build their own binary and spawn it).'
      files:
        - internal/childproc/childproc.go
        - internal/childproc/childproc_test.go
      deps:
        - 1
      done_when:
        - '`GetOrSpawn` spawns a child on first call, returns the cached live child on subsequent calls'
        - 'Child spawn uses the CORRECT arg order: `[binPath, --project-dir, <path>, serve, --port, 0]` — persistent flag precedes subcommand'
        - Port handshake parsing times out cleanly after 5s if the child never prints the ready line — returns a clear error, kills the child, removes from map
        - After the handshake is parsed, the scanner goroutine drains subsequent pipe output into `io.Discard` to prevent child blocking on pipe writes
        - Concurrent `GetOrSpawn` calls for the same project during cold spawn wait on a per-project `sync.Once`, not on the main supervisor mutex — verified by a test that fires 10 goroutines simultaneously
        - '`exitC` closes and the map entry is removed when the child exits for any reason'
        - '`Shutdown(ctx)` with a 5s deadline cleanly kills all children — SIGTERM first, SIGKILL survivors after 5s'
        - Idle reaper kills children where `time.Since(LastRequest) > idleTimeout`
        - '`LastRequest.Store` is atomic and safe to call from any goroutine'
        - Spawning uses `os.Executable()` not `os.Args[0]`
        - Per-child `httputil.ReverseProxy` is constructed once on spawn with `FlushInterval = 100 * time.Millisecond` and cached on the Child struct
        - Tests use shared `TestMain` + single `go build` of a stub binary (or the real htmlgraph binary) that mimics the handshake protocol
        - '`go test ./internal/childproc/...` completes in under 15 seconds'
        - '`go build ./... && go vet ./... && go test ./...` all pass'
      effort: L
      risk: Med
      tests: |
        Unit:
          - TestSupervisor_GetOrSpawn_Fresh — spawns, handshake succeeds, returns populated Child
          - TestSupervisor_GetOrSpawn_Cached — two calls return the same *Child instance
          - TestSupervisor_HandshakeTimeout — child never prints ready line, spawn returns error within 5s, child is killed
          - TestSupervisor_ChildExit_RemovesFromMap — kill the spawned child externally, assert map entry is gone after cmd.Wait() completes
          - TestSupervisor_Shutdown_SIGTERM — shutdown with plenty of deadline, all children exit cleanly via SIGTERM, no SIGKILL fired
          - TestSupervisor_Shutdown_SIGKILL — spawn a stub that ignores SIGTERM, assert SIGKILL fires after the deadline
          - TestSupervisor_IdleReaper — set idleTimeout=100ms, spawn child, wait 200ms without calling LastRequest.Store, assert reaper kills it
        Integration:
          - uses `go test -tags=integration` + a test-only `TestMain` that builds a stub binary mimicking htmlgraph's handshake protocol
        Regression:
          - no existing tests touched (new package)
      approved: false
      comment: ""
    - id: feat-c3e7a523
      num: 3
      title: Reverse-proxy /p/<id>/* routing in runGlobalServer
      what: 'In `cmd/htmlgraph/serve_global.go`, add `mux.Handle("/p/", corsMiddleware(http.HandlerFunc(proxyHandler)))` near the other route registrations. Implement `proxyHandler(w, r)` which: (1) parses the path via `strings.SplitN(strings.TrimPrefix(r.URL.Path, "/p/"), "/", 2)` — returns 404 if fewer than 1 segment; (2) **validates the project ID**: reject empty, `.`, `..`, contains `/`, contains null bytes, or matches `^[^a-zA-Z0-9_-]+$` (only alphanumeric, underscore, hyphen allowed since project IDs are 8-char SHA256 hex prefixes). Any validation failure returns 400 with a clear body — does NOT fall through to the supervisor. (3) Looks up the project ID in the registry via `reg.Load()` + linear scan (or a cached map) to get its `ProjectDir`; returns 404 if unknown. (4) Calls `supervisor.GetOrSpawn(r.Context(), projectID, projectDir)` — returns 502 with a clear body if spawn fails. (5) Uses the cached `child.proxy` field (constructed in slice 2) — does NOT reconstruct the proxy per request. (6) Before forwarding, rewrites `r.URL.Path` by stripping the `/p/<project-id>` prefix using `path.Clean("/" + rest)` — not string concatenation. (7) Calls `child.LastRequest.Store(time.Now().Unix())` and forwards. (8) The proxy''s `ErrorHandler` (set at construction time in slice 2) returns 502 with a clear body on child unreachable. Create the `Supervisor` instance in `runGlobalServer` scope at startup and plumb its `Shutdown(ctx)` through `http.Server.RegisterOnShutdown` for graceful parent exit.'
      why: 'The reverse proxy is the one-line contract between the global server''s outer mux and the per-project children. It''s the only layer that needs to understand ''how to get a request from the user into a child''; everything else (child lifecycle, frontend routing, aggregate reads) is independent. The `FlushInterval` setting is load-bearing for the SSE event stream (without it, `httputil.ReverseProxy` buffers the response and breaks EventSource). The 502 ErrorHandler is the crash-recovery story: if the child dies mid-request, the user sees an error, refreshes, and the next request spawns a fresh child.'
      files:
        - cmd/htmlgraph/serve_global.go
        - cmd/htmlgraph/serve_global_test.go
      deps:
        - 2
      done_when:
        - '`GET /p/<valid-id>/api/mode` returns the child''s `/api/mode` response (proxied)'
        - '`GET /p/<unknown-id>/api/mode` returns 404 with a clear body'
        - '`GET /p/../evil` and `GET /p/./api/mode` return 400 (path traversal rejected BEFORE supervisor lookup)'
        - '`GET /p//api/mode` (empty project ID) returns 400'
        - '`GET /p/abc%2Fdef/api/mode` (URL-encoded slash) returns 400'
        - '`POST /p/<valid-id>/api/plans/<plan-id>/chat` streams the response back unbuffered (FlushInterval in effect from slice 2''s cached proxy)'
        - If the child is killed externally mid-request, `proxyHandler` returns 502 via the `ErrorHandler`
        - The next request after a 502 respawns a fresh child (verified by `cmd.Wait()` returning and `GetOrSpawn` creating a new entry)
        - Per-child `ReverseProxy` is constructed once (in slice 2) and reused across requests
        - '`supervisor.Shutdown(ctx)` is called via `http.Server.RegisterOnShutdown` when the global server shuts down'
        - '`go build ./... && go vet ./... && go test ./...` all pass'
      effort: M
      risk: Med
      tests: |
        Unit:
          - TestProxyHandler_PathShape — /p/a/b proxies, /p/ 404s, /p 404s
          - TestProxyHandler_UnknownProject_404 — registry miss returns 404 with body
          - TestProxyHandler_SpawnFailure_502 — supervisor returns error, handler returns 502
          - TestProxyHandler_ChildDead_502 — kill child externally, send request, assert 502 via ErrorHandler
          - TestProxyHandler_PrefixStripped — child receives r.URL.Path without /p/<id> prefix
        Integration:
          - start global server with a real child (via supervisor spawning a test stub), proxy /p/<id>/api/mode, assert response body comes from the child
          - SSE streaming: proxy /p/<id>/api/events/stream, read first chunk within 200ms (proves FlushInterval works)
          - crash recovery: kill child, send next request, assert fresh child spawned (PID differs from first)
        Regression:
          - existing serve_global tests must still pass
      approved: false
      comment: ""
    - id: feat-d4f8b634
      num: 4
      title: Remove dispatchByProject + aggregate handlers + projectCache (true doorway)
      what: |-
        In `cmd/htmlgraph/serve_global.go`, delete every project-scoped and cross-project-aggregate route. This is the architectural cleanup slice: after it lands, the global server holds zero SQLite handles and serves only the projects landing SPA, the reverse proxy, and a tiny `/api/mode` endpoint.

        **Delete entirely** (function + registrations):
        - `dispatchByProject` function
        - `projectCache` type, instance, and all its methods
        - `loadProjectSummaries` (counts-from-DB logic) — replace with a simpler `listRegisteredProjects()` that iterates the registry and returns `{id, name, dir, gitRemoteURL, lastSeen}` for each — no DB opens, no counts
        - `countByType` / any helper that runs COUNT queries against project DBs
        - `aggregateStats` and the `/api/projects/all/stats` route
        - `globalSSEHandler` and the `/api/events/stream` route (stream moves inside each child via proxy)
        - `globalRecentEventsHandler` and the `/api/events/recent` route (same)
        - All project-scoped routes previously dispatched via `dispatchByProject`: `/api/sessions`, `/api/features`, `/api/features/detail`, `/api/features/related`, `/api/features/`, `/api/graph`, `/api/events/tree`, `/api/events/subagent`, `/api/plans`, `/api/plans/`, `/api/transcript`, `/api/sessions/`, `/api/stats`, `/api/events/recent`, `/api/events/stream` — all handled by the child via `/p/<id>/api/*` proxy now

        **Keep** (narrowed global API surface):
        - `/api/mode` — returns `{"mode":"global"}`, no other fields
        - `/api/projects` — returns the registry list WITHOUT counts; fields are exactly `{id, name, dir, gitRemoteURL, lastSeen}`. Add a doc comment on the handler: `// No DB access. Registry JSON only. Counts and per-project data come from the child via /p/<id>/api/*.`
        - `/p/<project-id>/*` — the reverse proxy from slice 3
        - `/` — the landing SPA (embedded dashboard files)

        Since the global server no longer opens any SQLite connection, there is NO WAL audit needed on the global side (the original plan's concern evaporates when the handles evaporate). The child-side WAL pragma is still required for normal single-project operation but that's unchanged from today's single-project server — not a new constraint introduced by this slice.
      why: 'This is the slice where the security property becomes real. Removing `dispatchByProject` eliminates the router surface where a project-scoped write could land in the wrong project. Renaming and re-scoping `projectCache` to `aggregateCache` makes the invariant (''global-scope access is read-only'') grep-enforceable: every DB handle in the global server is in a variable whose name declares the constraint. Must land after slice 3 (which provides the replacement) and before slice 5 (which removes the `?project=` param from the frontend); if landed out of order, the frontend will 404 on every call between deployments.'
      files:
        - cmd/htmlgraph/serve_global.go
        - cmd/htmlgraph/serve_global_test.go
      deps:
        - 3
      done_when:
        - '`dispatchByProject` function is deleted — `grep -rn dispatchByProject cmd/ internal/` returns zero matches'
        - '`projectCache` type and instance are deleted — grep returns zero matches'
        - '`loadProjectSummaries`, `countByType`, `aggregateStats`, `globalSSEHandler`, `globalRecentEventsHandler` are all deleted'
        - '`/api/projects/all/stats`, `/api/events/stream`, `/api/events/recent`, `/api/stats` are NOT registered on the global mux'
        - '`/api/projects` returns registry-only data without feature/bug/spike counts — response schema is `[{id, name, dir, gitRemoteURL, lastSeen}]`'
        - '`grep -rn ''sql.Open\|dbpkg.Open\|registry.OpenReadOnly'' cmd/htmlgraph/serve_global.go` returns zero matches (global server opens zero SQLite connections)'
        - '`grep -rn ''?project='' cmd/htmlgraph/` returns zero matches'
        - 'Smoke test: `htmlgraph serve --global`, `curl /api/projects` returns the registry list with no counts, `curl /api/plans` returns 404, `curl /p/<id>/api/plans` proxies to the child'
        - Unit test `TestGlobalServer_NoSQLiteHandles` — start a global server, inspect the process (via test hook or reflection) and assert no `*sql.DB` instances exist in global scope
        - '`go build ./... && go vet ./... && go test ./...` all pass'
      effort: M
      risk: Med
      tests: |
        Unit:
          - TestAggregateCache_OnlyReadOnly — reflect/scan every *sql.DB opened by aggregateCache, assert the connection string contains mode=ro
          - TestServeGlobal_NoDispatchByProject — grep the mux for handlers that reference dispatchByProject; none should exist
          - TestServeGlobal_NoQueryParamRouting — send GET /api/plans?project=anything, assert 404 (the route is deleted entirely, not 400)
        Integration:
