questions:
    - id: q-port-handshake
      text: How does a child announce its bound ephemeral port back to the parent?
      description: 'The child binds `127.0.0.1:0` and the kernel assigns a free port. The parent needs that number before it can route any request. Three options: **stdout line** — child prints `htmlgraph-serve-ready port=<N> pid=<PID>` as its first output, parent scans the pipe with a 5s deadline; simple but requires the child to never print anything else before the handshake and requires the parent to keep the pipe plumbed. **Handshake file** — child writes `<project-dir>/.htmlgraph/.serve-port` on ready, parent polls for it; decouples from stdout but adds filesystem dependency and polling latency. **Parent-created pipe** — parent creates an os.Pipe before Start, passes the write end via `cmd.ExtraFiles`, child writes to fd 3; cleanest but requires Unix fd passing which has Windows quirks (not a target here). All three work on macOS/Linux. Stdout is the simplest, plays nicely with `go test` (stdout is captured), and has well-understood failure modes.'
      recommended: stdout-line
      options:
        - key: stdout-line
          label: 'A: Stdout handshake line — parent scans child stdout for ''htmlgraph-serve-ready port=N'' with 5s deadline; simple, works everywhere, no filesystem dependency'
        - key: handshake-file
          label: 'B: Handshake file at .htmlgraph/.serve-port — child writes, parent polls; decouples from pipe plumbing but adds polling and cleanup concerns'
        - key: fd-pipe
          label: 'C: Parent-allocated pipe via ExtraFiles fd 3 — cleanest IPC but requires Unix fd passing and more code in the child'
      answer: stdout-line
    - id: q-aggregate-reads
      text: How does the global server handle cross-project reads and per-project card metadata?
      description: 'Post-slice-4 the global server no longer dispatches per-project requests. Three kinds of reads were originally lumped together: (1) cross-project aggregates (`/api/projects/all/stats`, `/api/events/stream`, `/api/events/recent`), (2) per-project card metadata (feature/bug/spike counts shown on landing cards), and (3) per-project detail views (handled by child proxy under `/p/<id>/*` regardless of this question). The original options (a)-(c) debated how to keep kinds (1) and (2) working. **Option (d) drops kinds (1) and (2) entirely** — the landing page becomes a pure doorway showing only registry metadata (name, path, remote, last seen), and all cross-project analytics are explicitly deferred to a Phase 2 feature. Strongest architectural guarantee: the global server holds ZERO SQLite connections, grep-enforceable. Weakest information density on the landing, but that''s acceptable because cards still tell you what''s available; you click in to get detail.'
      recommended: true-doorway
      options:
        - key: lazy-ro-cache
          label: 'A: Lazy read-only cache — global server opens mode=ro connections to each project for aggregates and card counts'
        - key: fan-in-http
          label: 'B: Fan-in over HTTP — global server calls each child''s API for aggregates'
        - key: direct-file-reads
          label: 'C: Read event JSONL files directly from disk without SQLite'
        - key: true-doorway
          label: 'D: True doorway — drop cross-project aggregates AND per-project card counts; global server holds zero SQLite handles; analytics deferred to Phase 2'
      answer: true-doorway
    - id: q-idle-reap-timeout
      text: What is the default idle-reap timeout for child processes?
      description: Children are reaped when no request has hit them for N minutes to prevent process leaks during long dashboard sessions. Too short and users see respawn latency every time they tab back to the dashboard; too long and memory accumulates. Each idle Go process holds ~10-20 MB resident memory, negligible for a dozen projects but non-zero for hundreds. Respawn latency is ~300-500ms (process start + DB open + migration check). 15 min is aggressive and may annoy users who context-switch between projects on the same browser session; 60 min is lax and leaves processes around after lunch. 30 min matches typical 'active session' intuition — if you haven't touched a project in half an hour, its process can probably be reclaimed without annoyance. Should be a flag regardless (`--idle-timeout`) so ops can tune it; the question is just the default.
      recommended: thirty-minutes
      options:
        - key: fifteen-minutes
          label: 'A: 15 minutes — aggressive reclaim, may trigger respawns during normal browsing'
        - key: thirty-minutes
          label: 'B: 30 minutes — balanced default; matches active-session feel'
        - key: sixty-minutes
          label: 'C: 60 minutes — conservative, minimizes respawns but holds more memory'
        - key: disabled-default
          label: 'D: No reaping by default — children live until global server shutdown; operator opts in via flag'
      answer: thirty-minutes
    - id: q-legacy-removal
      text: Remove dispatchByProject / query-param routes immediately or keep as deprecated for one release?
      description: The current `?project=<id>` dispatch was merged to main earlier today (2026-04-09). It has no external callers — the dashboard is the only client, and slice 5 removes all references. There are two sensible answers. **Remove immediately** — fewer moving parts, one-way migration, no accidental path that leads back into the unsafe routing, smaller surface area for slice 4's cleanup test. **Keep deprecated for one release** — belt-and-suspenders safety for any dashboard-version-skew situations (e.g., a user's browser has the old JS cached and the server is already on the new backend); adds maintenance burden and a grep target for 'deprecated code to remove later'. Given that dashboard assets ship embedded in the binary (no skew possible by construction), deprecation buys nothing.
      recommended: remove-immediately
      options:
        - key: remove-immediately
          label: 'A: Remove dispatchByProject and all query-param routes in slice 4 — clean one-way migration, enforced by grep in the slice 4 done_when'
        - key: deprecate-one-release
          label: 'B: Keep query-param dispatch as deprecated, log a warning, delete in a follow-up feature after the next release'
      answer: remove-immediately
    - id: q-child-binary
      text: How does the supervisor locate the htmlgraph binary to spawn children?
      description: The supervisor needs a path to `htmlgraph` to `exec.Command` with `serve --port 0 --project-dir <path>`. Two options. **`os.Executable()`** — returns the path of the currently-running binary (works on all Unixes, handles symlinks correctly with `filepath.EvalSymlinks`, guarantees the child is byte-identical to the parent, makes `go test` work out of the box because the test binary becomes the 'child'). **PATH lookup** — `exec.LookPath('htmlgraph')` resolves against `$PATH`, requires the user to have `htmlgraph` installed globally, fails if the user's shell PATH differs from the server's env, doesn't guarantee version parity (could spawn an old `htmlgraph` if the user updated the dev binary but not `~/.local/bin`). `os.Executable()` is strictly better for correctness and testability; the only reason to choose LookPath is if we ever wanted to support 'spawn a different version as child' which is a hypothetical we don't need and shouldn't design for (YAGNI).
      recommended: os-executable
      options:
        - key: os-executable
          label: 'A: os.Executable() — guarantees version parity, works in tests, no PATH dependency'
        - key: path-lookup
          label: 'B: exec.LookPath(''htmlgraph'') — relies on $PATH, may spawn a different version than the parent'
      answer: os-executable
critique:
    reviewed_at: "2026-04-09"
    reviewers:
        - Haiku (design review)
        - Sonnet (feasibility)
    assumptions:
        - id: A1
          status: verified
          text: runServer is extractable into a factory
          evidence: serve.go:38-98 — runServer spans the claimed range; factory extraction requires moving route registration out of the server-start path. Entangled with DB open, goroutine launch, and ListenAndServe but separable with care.
        - id: A2
          status: questionable
          text: autoIngestLoop is where os.Getwd() needs to be parameterized
          evidence: serve.go:238-243 shows autoIngestLoop only calls autoIngestOnce. The os.Getwd() calls are in autoIngestOnce at lines 249 (projectFilter for DiscoverSessions) and 309 (reading .htmlgraph/.launch-mode). Two call sites, not one. Slice 1 must parameterize autoIngestOnce.
        - id: A3
          status: verified
          text: Approximately 13 project-scoped routes need removal from the global mux
          evidence: serve_global.go has 15 dispatchByProject call sites across 13 distinct mux.Handle registrations. Three of the registrations are combo handlers (/api/stats, /api/events/recent, /api/events/stream) that also serve aggregate reads — these require branch-level surgery, not full registration deletion.
        - id: A4
          status: verified
          text: buildProjectUrl has 18+ call sites across the dashboard JS
          evidence: 21 grep hits including the function definition and comments; 18 distinct fetch/EventSource call sites across app.js (~13), transcript-view.js (4), event-tree.js (3). One intentional bare fetch('/api/mode') at app.js:1114 for global-scope mode detection is correctly left out.
        - id: A5
          status: falsified
          text: The plan template's fetch('/api/plans/<id>/chat') naturally resolves relative to /p/<id>/ because it's relative
          evidence: plan_page.gohtml has TEN absolute-path fetch calls (leading slash) at lines 515, 543, 596, 616, 661, 871, 898, 1043, 1094, 1117 — all resolve against the origin, not the page path. Under /p/A/plans/plan-123, fetch('/api/plans/...') goes to /api/plans/... which will 404 after slice 4. Slice 5 needs a concrete fix for all 10 fetch sites, not just /chat.
        - id: A6
          status: questionable
          text: SQLite WAL supports concurrent readers while children are writing
          evidence: True in principle (SQLite WAL allows one writer + many readers), but requires BOTH the parent's read-only connection AND the child's read-write connection to have journal_mode=WAL explicitly set. Must audit registry.OpenReadOnly and dbpkg.Open for WAL pragma before relying on concurrent access in slice 4.
        - id: A7
          status: verified
          text: The existing buildSingleProjectMux does not need a dashboardFS parameter
          evidence: dashboard.go:9-16 — dashboardFS is a package-level //go:embed var accessed via dashboardSub(). Calling it from the factory needs no parameter injection. Plan's proposed 3-arg signature should drop dashboardFS.
        - id: A8
          status: falsified
          text: serve subcommand accepts --project-dir flag directly
          evidence: main.go:37-42 — --project-dir is a persistent flag on the root command, not on the serve subcommand. Cobra requires persistent flags before their subcommand. Child spawn args MUST be [bin, '--project-dir', path, 'serve', '--port', '0'] NOT [bin, 'serve', '--port', '0', '--project-dir', path]. Slice 2's current spec will fail to parse at runtime.
        - id: A9
          status: verified
          text: runGlobalServer has no hidden lifecycle dependencies (signals, goroutines, package-level state)
          evidence: 'serve_global.go:91-98 — runGlobalServer is thin: builds mux, prints banner, calls ListenAndServe. No signal handlers, no background goroutines, no package-level state. The refactor has no gotchas in the global path.'
        - id: A10
          status: verified
          text: No existing test spawns the htmlgraph binary or uses TestMain for shared build
          evidence: grep of *_test.go for TestMain and exec.Command('go' returned zero matches. Current go test ./cmd/htmlgraph/... is ~0.5s cached. Slice 6's subprocess tests add 15-30s; a shared TestMain+go build is required (not optional) to keep CI under budget.
        - id: A11
          status: verified
          text: Prior art for Supervisor pattern exists in internal/planchat/backend.go
          evidence: internal/planchat/backend.go:174 uses exec.CommandContext + StdoutPipe + Start + scan-stdout-lines + Wait. This is the closest model to the proposed Supervisor's handshake scanner. claude.go:393 (mentioned in plan) is a weaker model because it uses .Run() (blocking).
    critics:
        - title: DESIGN CRITIC
          sections:
            - heading: Slice Assessment
              items:
                - badge: S1
                  kind: success
                  text: Factory extraction straightforward. Handshake line protocol is simple and testable. Must correct autoIngestOnce target (two os.Getwd sites) and drop dashboardFS from the factory signature.
                - badge: S2
                  kind: warn
                  text: Child must emit handshake as FIRST stdout output or the parent's parser corrupts. Redirect child stdout/stderr to per-project log file AFTER handshake. Concurrent requests racing on spawn need per-project condition variable to avoid herd thundering.
                - badge: S3
                  kind: warn
                  text: Path validation in proxyHandler must reject '..', empty segments, URL-encoded slashes, and '.' for project ID to prevent traversal. Director must strip /p/<id> prefix via explicit path manipulation, not string replacement.
                - badge: S4
                  kind: danger
                  text: Combo handlers (/api/stats, /api/events/recent, /api/events/stream) require branch-level surgery, not deletion. Also must audit SQLite WAL settings on both parent and child before assuming concurrent access works. Deploy-order coupling with S5 creates a 404 window unless merged atomically.
                - badge: S5
                  kind: danger
                  text: The 'relative URL naturally resolves' claim is FALSE. Ten absolute-path fetches in plan_page.gohtml all break. Must inject a template variable like window.htmlgraphPlanBase at render time and prefix every fetch. Also must move /plans/<id>.html static file serving into the child (currently at serve.go:80 FileServer).
                - badge: S6
                  kind: success
                  text: Integration tests well-specified. Cross-project contamination proof via direct SQLite read is the correct acceptance criterion. Must use shared TestMain + single go build to stay under CI budget (not optional).
            - heading: Gaps & Missing Considerations
              items:
                - badge: Gap
                  kind: warn
                  text: Child stdout/stderr logging after handshake — where do child logs go? If parent's pipe reader stops reading after handshake, child will eventually block on pipe write. Need per-project log file or /dev/null redirect.
                - badge: Gap
                  kind: warn
                  text: Dashboard UX during cold-spawn latency (~300-500ms). First click on an idle-reaped project shows blank page briefly. Consider a loading indicator or pre-warm on landing render.
                - badge: Gap
                  kind: warn
                  text: Herd problem — if N concurrent requests hit an un-spawned project, all N will wait on the supervisor mutex. Per-project condition variable or singleflight pattern keeps spawn serialized without blocking the N requests unnecessarily.
                - badge: Gap
                  kind: info
                  text: Auth/ACL — no enforcement today. Under new model a user navigating /p/<unknown-id>/ gets 404, /p/<known-id>/ gets full access. Not a regression but should be explicitly acknowledged in design constraints.
                - badge: Gap
                  kind: warn
                  text: Version skew — two global servers (e.g., old dev binary + new marketplace binary) on the same machine will fight over ephemeral ports and can leave orphaned children. Must document 'only one global server per machine' or add a lockfile.
                - badge: Gap
                  kind: danger
                  text: Plan template path routing — plan HTML files are served at /plans/<id>.html via FileServer (serve.go:80), not via the API router. Under new architecture this path is only accessible via /p/<id>/plans/<id>.html through the child proxy. Slice 5 must account for this.
            - heading: Alternative Approaches
              items:
                - badge: Alt
                  kind: info
                  text: Worker pool (N fixed processes handling any project on-demand) vs per-project child. Plan correctly chose per-project because hook/env context must be baked at process start. Correct tradeoff.
                - badge: Alt
                  kind: info
                  text: In-process goroutine pools with DB sharding. Rejected because a panic in project A could crash project B. Plan correctly prioritized crash isolation.
                - badge: Alt
                  kind: info
                  text: Unix domain sockets instead of TCP. Eliminates port discovery but adds Unix-only complexity. TCP loopback is the right choice for cross-platform scope.
        - title: FEASIBILITY CRITIC
          sections:
            - heading: What Exists to Leverage
              items:
                - badge: Prior
                  kind: success
                  text: internal/planchat/backend.go:174 — exec.CommandContext + StdoutPipe + Start + stdout scanner + Wait. Closest prior art for the Supervisor handshake scanner.
                - badge: Prior
                  kind: success
                  text: cmd/htmlgraph/claude.go:393 — exec.Command with Dir + Env injection. Model for child env setup (HTMLGRAPH_PROJECT_DIR propagation).
                - badge: Prior
                  kind: info
                  text: cmd/htmlgraph/plan_cmds.go:268 uses os.Args[0] for self-re-exec. Plan's choice of os.Executable() is better (handles moved binaries and symlinks correctly).
                - badge: Prior
                  kind: success
