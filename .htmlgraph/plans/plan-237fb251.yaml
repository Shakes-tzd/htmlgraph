                - badge: Ref
                  kind: info
                  text: containerd / kubelet use similar spawn-track-signal-on-shutdown patterns for child lifecycle. The Supervisor design matches these widely-used models.
    risks:
        - risk: Plan template absolute-URL fetches break under /p/<id>/ routing (10 call sites, all interactive plan actions)
          severity: High
          mitigation: Slice 5 injects a window.htmlgraphPlanBase variable at template render time and prefixes all 10 fetch calls. Acceptance test covers plan chat, plan finalize, plan feedback, and plan yaml POST.
        - risk: Child spawn arg order wrong — --project-dir before serve subcommand, not after
          severity: High
          mitigation: Slice 2 spec corrected. Test spawns a real child with the correct arg order and asserts startup.
        - risk: Child stdout corruption before handshake — any startup print before the handshake line breaks the parser
          severity: Medium
          mitigation: Child main must guarantee the handshake line is the FIRST stdout write. After the handshake, redirect stdout/stderr to a per-project log file in .htmlgraph/logs/serve-<port>.log. Slice 1 and Slice 2 share this requirement.
        - risk: SQLite WAL mode not enabled on parent read-only or child read-write connection, causing blocked writers
          severity: Medium
          mitigation: Slice 4 audits both connection opens and adds journal_mode=WAL to the URI if missing. Acceptance test opens a parent RO connection and a child RW connection simultaneously and asserts concurrent reads during writes succeed.
        - risk: Deploy-order window between Slice 4 (remove dispatchByProject) and Slice 5 (frontend /p/ navigation) — frontend 404s if landed out of order
          severity: Medium
          mitigation: Slices 3, 4, 5 land in a single merge (or slice 4 keeps a deprecation shim until slice 5 ships). CI merge gate blocks slice 4 merge unless slice 5 is in the same PR.
        - risk: Herd problem on cold spawn — N concurrent requests all wait on the supervisor mutex during 300-500ms spawn
          severity: Low
          mitigation: Per-project sync.Once or golang.org/x/sync/singleflight for the spawn; waiting requests wake after spawn completes. Single-user dashboard use case makes this mostly theoretical but the fix is small.
        - risk: Path traversal via /p/../evil in proxyHandler
          severity: Medium
          mitigation: 'Slice 3 validates project ID via explicit rules: no ''/'', no ''..'', no empty, no ''.''. Director strips /p/<id> prefix via path.Clean not string manipulation.'
        - risk: Child orphan on parent crash — if parent is SIGKILLed, children remain running on their ephemeral ports
          severity: Low
          mitigation: Children check parent liveness via prctl(PR_SET_PDEATHSIG, SIGTERM) on Linux. macOS has no direct equivalent; use a heartbeat goroutine that checks parent PID every 5s and exits if parent is gone. Documented as a known limitation in the design constraints.
        - risk: Version skew — two global servers on one machine fight over lockfiles or leave orphaned children
          severity: Low
          mitigation: Document 'single global server per host' as a constraint. Optionally add a lockfile at ~/.htmlgraph/global-server.lock that the parent takes on startup.
    synthesis: |-
        Plan was critiqued at v2 and significantly revised. Two falsified assumptions (A5 absolute-path URLs, A8 persistent-flag arg order) would have caused runtime failures on first use; both fixed in slices 5 and 2 respectively. Three more minor corrections (A2 autoIngestOnce target, A3 combo-handler surgery, A7 dashboardFS signature) are mechanical.

        At v3, the human answered Q2 with a new option (d): **true doorway**. This simplifies slice 4 substantially — instead of renaming projectCache to aggregateCache and auditing WAL pragmas for concurrent RO reads, slice 4 now deletes the cache entirely along with all aggregate handlers. The landing page becomes a registry-metadata view (no counts, no cross-project synthesis), and all per-project data is served by the child via the reverse proxy. Strongest architectural guarantee: the global server holds zero SQLite connections, grep-enforceable.

        Deferred to Phase 2 (separate track): per-project card counts, cross-project aggregates (stats, events stream, recent events), and any comparative analytics. This is an intentional MVP reduction to ship the architectural boundary correctly; the feature surface comes back in a subsequent design pass once the isolation model is stable and we know what patterns actually matter.

        Verdict: BUILDABLE AS WRITTEN at v3. All 4 questions answered. Proceed to dispatch.
