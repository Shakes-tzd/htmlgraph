    track_id: trk-cb36e595
    title: Session HTML canonical store via live-append
    description: Migrate sessions from SQLite-primary to HTML-canonical storage using a live-append model. Session HTML files are opened on SessionStart, left structurally unterminated during the session, and events are appended via O_APPEND atomic writes. PostToolUse is the sole HTML writer per tool call, consolidating both pre and post data into a single <li> via a transient marker table. Crash recovery via orphan marker sweep. SQLite becomes a rebuildable read index mirrored from HTML. Ingest path becomes a render path. Reindex rebuilds SQLite from session HTML files. Escape safety by construction via CLI chokepoint + html/template + fragment validation.
    created_at: "2026-04-10"
    status: draft
    version: 2
