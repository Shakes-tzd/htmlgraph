meta:
    id: plan-c248b73f
    track_id: trk-0677c709
    title: 'Multi-CLI integration: Gemini, Codex, Copilot'
    description: |
        Integrated foundation + per-runtime packaging plan that makes HtmlGraph a first-class participant in Gemini CLI, Codex CLI, and GitHub Copilot CLI sessions alongside existing Claude Code support. Synthesizes three prior plans (GEMINI_INTEGRATION_PLAN.md, docs/codex-cli-integration-plan.md, ~/.copilot/session-state/.../plan.md) into one execution that does shared foundation work ONCE instead of three times.
    created_at: "2026-04-11"
    status: draft
    created_by: claude-opus-4-6
    version: 1
design:
    problem: |
        HtmlGraph today is Claude-shaped end to end. The Go CLI is host-neutral, but the plugin packaging (plugin/.claude-plugin/), hook event schema (internal/hooks/runner.go CloudEvent), session ingestion (internal/ingest/discover.go scanning only ~/.claude/projects/), agent detection (internal/agent/detect.go recognizing only claude-code + human), and plugin install command (cmd/htmlgraph/plugin.go hardcoding `claude plugin ...`) all assume Claude Code as the runtime. The repo already has AGENTS.md, CODEX.md, GEMINI.md, and a partial Gemini ingestion adapter (internal/ingest/gemini_discover.go) — but no codex or copilot ingest, no MCP server, no runtime enum, and no per-runtime packaging. Three separate integration plans exist (codex/copilot/gemini) and each independently proposes the same foundation work: host adapter, runtime tagging, MCP server, transcript ingestion. Doing them serially would re-litigate the same architectural decisions three times and produce inconsistent runtime adapters.
    goals:
        - '**Foundation done once** — host adapter pattern, runtime enum, generic event normalization, and MCP server land before any per-runtime packaging starts'
        - '**Each runtime gains parity on the four pillars** — session/transcript ingestion, work-item attribution, structured tool access (MCP), and an installable plugin bundle'
        - '**No Claude-shaped assumptions leak into new code** — every new file under `internal/host/` or `internal/ingest/` must be runtime-tagged at the call site, not by string comparison deep in business logic'
        - '**Honest support matrix** — README documents what works per runtime and what''s deferred (e.g., Codex hooks are Bash-only); no implication of parity where none exists'
        - '**Existing Gemini ingest is the reference implementation** — don''t rewrite `internal/ingest/gemini_discover.go`, generalize from it'
    constraints:
        - Cannot modify the htmlgraph CLI's public command surface in breaking ways — existing Claude users must keep working without reconfig
        - Codex hooks are feature-flagged and Bash-only for PreToolUse/PostToolUse — non-Bash tool observability must come from transcript ingestion, not hooks (per https://developers.openai.com/codex/hooks)
        - Copilot CLI binary today ships via the VS Code extension's globalStorage AND via @github/copilot npm package — packaging must work in both delivery modes
        - 'Per AGENTS.md and CLAUDE.md: edit `plugin/` not `.claude/` (auto-synced). New runtime trees must follow the same single-source-of-truth discipline'
        - MCP server, if added, should be built into the `htmlgraph` binary as a subcommand (e.g., `htmlgraph mcp serve`) to avoid a second binary in the install path — pending design Q2
        - Each runtime's session-discovery directory must be discoverable without requiring the user to set extra env vars (Gemini scans ~/.gemini/tmp/, Codex scans ~/.codex/sessions/, Copilot scans ~/.copilot/session-state/)
    approved: false
    comment: ""
slices:
    - id: feat-host-adapter
      num: 1
      title: Host adapter foundation + runtime enum
      what: |
        Add internal/host/ package with subpackages claude, codex, copilot, gemini. Define a Runtime enum (claude|codex|copilot|gemini|human). Move runtime-shaped logic out of internal/hooks/runner.go into internal/host/claude/normalize.go. Add a host.Normalize(runtime, raw) (CloudEvent, error) entry point. Refactor selfBinary() in internal/hooks/task_tracking.go:17 to read HTMLGRAPH_PLUGIN_ROOT first, falling back to CLAUDE_PLUGIN_ROOT for compatibility, then os.Executable, then PATH lookup. Add a runtime column to the sessions table in SQLite (with migration) so future ingestion can tag sessions correctly. No behavior change for existing Claude users.
      why: |
        Goal "Foundation done once". Without this seam, every per-runtime slice will sprinkle if-runtime-codex branches across internal/hooks and internal/ingest. The codex plan calls this out explicitly as Risk 1 (Overfitting To Claude) and as Phase 1 (Establish The Codex Adapter Surface). Both copilot and gemini plans implicitly need it.
      files:
        - internal/host/runtime.go
        - internal/host/claude/normalize.go
        - internal/host/codex/normalize.go
        - internal/host/copilot/normalize.go
        - internal/host/gemini/normalize.go
        - internal/hooks/runner.go
        - internal/hooks/task_tracking.go
        - internal/db/migrations/NNNN_sessions_runtime.sql
      deps: []
      done_when:
        - internal/host/runtime.go exports Runtime type with constants ClaudeCode, Codex, Copilot, Gemini, Human and a String() method
        - internal/hooks/runner.go no longer references claude directly; CloudEvent struct now has a Runtime host.Runtime field
        - selfBinary() reads HTMLGRAPH_PLUGIN_ROOT first, CLAUDE_PLUGIN_ROOT fallback, with a unit test covering both env vars
        - Sessions table has a runtime TEXT NOT NULL DEFAULT 'claude-code' column applied via migration; existing rows backfill to claude-code
        - All existing tests pass without modification (no behavior change for Claude path)
      effort: M
      risk: Med
      tests: |
        Unit: TestRuntimeString covers all enum values; TestSelfBinaryEnvFallback covers both env vars and missing-var case
        Unit: TestNormalizeClaudeRoundtrip ensures the refactored Claude normalize.go produces identical CloudEvents to the pre-refactor runner for a captured fixture
        Migration: TestSessionsRuntimeMigrationBackfill applies the migration to a fixture DB and asserts existing rows get claude-code
        Regression: existing internal/hooks/*_test.go must pass unchanged
      approved: false
      comment: ""
    - id: feat-runtime-detect
      num: 2
      title: Extend agent detection for codex/gemini/copilot
      what: |
        Update internal/agent/detect.go:37 to recognize codex, gemini, and copilot in addition to claude-code. Detection priority: HTMLGRAPH_AGENT_ID env var (existing), then runtime-specific markers (CODEX_SESSION_ID, GEMINI_CLI_VERSION, COPILOT_AGENT_ID — verify exact env var names against each CLI's source/docs first), then CLAUDE_CODE=1, then human. Return values must match the Runtime enum from slice 1.
      why: |
        Goal "No Claude-shaped assumptions leak into new code". Without auto-detection, every hook handler would need the user to manually set HTMLGRAPH_AGENT_ID. Several downstream slices (codex hooks, copilot plugin) depend on the runtime being identified at session start without user configuration.
      files:
        - internal/agent/detect.go
        - internal/agent/detect_test.go
      deps:
        - 1
      done_when:
        - Detect() returns host.Codex when CODEX_SESSION_ID is set
        - Detect() returns host.Gemini when GEMINI_CLI_VERSION is set
        - Detect() returns host.Copilot when COPILOT_AGENT_ID is set
        - HTMLGRAPH_AGENT_ID env var still wins over auto-detection (override)
        - Existing claude-code path unchanged
      effort: S
      risk: Low
      tests: |
        Unit: TestDetectAllRuntimes — table-driven test setting each env var in isolation and asserting the correct Runtime is returned
        Unit: TestDetectOverridePrecedence — HTMLGRAPH_AGENT_ID overrides auto-detection
        Regression: TestDetectClaudeCode and TestDetectHuman from existing detect_test.go must pass
      approved: false
      comment: ""
    - id: feat-mcp-server
      num: 3
      title: HtmlGraph MCP server as htmlgraph mcp serve
      what: |
        Add internal/mcp/ package implementing a Model Context Protocol server that exposes a curated set of HtmlGraph operations as typed tools. Wire it as a new subcommand htmlgraph mcp serve in cmd/htmlgraph/. First tools (read-heavy, low-risk): htmlgraph_status, htmlgraph_snapshot, htmlgraph_find, htmlgraph_session_show, htmlgraph_feature_list. Then write tools: htmlgraph_feature_create, htmlgraph_feature_start, htmlgraph_feature_complete, htmlgraph_link_add. Tools must be thin wrappers over existing CLI logic — no business logic duplication.
      why: |
        Goal "Each runtime gains parity on structured tool access". Codex and Copilot plans both rank MCP as the highest-leverage step because hooks alone are too narrow. Without MCP, every runtime ends up shelling out to htmlgraph and parsing markdown — fragile and hard to test. With MCP, runtime plugins become thin wrappers that reference typed tools.
      files:
        - internal/mcp/server.go
        - internal/mcp/tools_read.go
        - internal/mcp/tools_write.go
        - internal/mcp/server_test.go
        - cmd/htmlgraph/mcp.go
      deps:
        - 1
      done_when:
        - htmlgraph mcp serve starts an MCP server on stdio (default) or --port for TCP
        - All 9 listed tools are registered with full JSONSchema parameter definitions
        - Read tools (status, snapshot, find, session_show, feature_list) return structured JSON, not markdown
        - Write tools call into existing internal/work or internal/links functions — no SQL or HTML manipulation in mcp/
        - 'Smoke test: an MCP client connects, calls htmlgraph_status, gets a valid response'
      effort: L
      risk: Med
      tests: |
        Unit: TestServerRegistersAllTools — assert tool count and names
        Unit: TestToolStatusReturnsStructured — call htmlgraph_status, parse JSON, assert known fields
        Integration: TestMCPRoundtrip — start server in goroutine, send list_tools and call_tool messages, assert responses
        Regression: cmd/htmlgraph/ existing subcommands still work
      approved: false
      comment: ""
