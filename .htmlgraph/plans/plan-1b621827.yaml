    - id: q-backfill-threshold
      text: What is the default time-gap threshold for the backfill heuristic?
      description: 'The backfill migration detects logical session boundaries by finding gaps between consecutive message timestamps. Too short and we split during long thinks or compile steps. Too long and we miss quick resumes where the user closed Claude Code and opened it again within a few minutes. Research on shakestzd''s 3f70c3f9 found 38 gaps > 5 minutes and 16 segments > 30 minutes. 5 minutes is too aggressive (will split during long Bash runs or complex tool calls). 30 minutes is the user''s typical ''leave and come back'' cycle. 60 minutes is safer but undercounts real resumes. Worth noting: the threshold is a backfill heuristic only ā€” live hook data uses the ground-truth source field and isn''t affected by this choice.'
      recommended: thirty-minutes
      options:
        - key: fifteen-minutes
          label: 'A: 15 minutes ā€” aggressive, may split long thinks and compile steps as false boundaries'
        - key: thirty-minutes
          label: 'B: 30 minutes ā€” balanced default, matches typical ''leave and come back'' cycle'
        - key: sixty-minutes
          label: 'C: 60 minutes ā€” conservative, undercounts quick resumes but zero false positives'
        - key: two-hours
          label: 'D: 2 hours ā€” very conservative, only splits on overnight or lunch-length breaks'
      answer: null
