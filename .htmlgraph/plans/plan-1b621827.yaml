    - id: q-verification-spike
      text: Should slice 1 be a committed SPIKE that blocks everything, or a non-blocking verification we do in parallel with slice 2 coding?
      description: The research confirmed `event.Source` is declared in the CloudEvent struct but has zero usage anywhere in htmlgraph's codebase ā€” no log line, no read, no downstream action. We have no empirical evidence Claude Code actually populates this field in practice. Slice 1 is designed as a verification spike to confirm the field is non-empty before any schema or write-path work commits to using it. Option (a) treats it as a hard blocker ā€” nothing ships until the field is verified. Option (b) treats it as parallel work that can be verified while slice 2 is being built, with the understanding that slice 2 might need to pivot if the verification fails. Option (a) is slower but safer; option (b) is faster but carries pivot risk. Given the launch timeline (this plan is the differentiator), safer is better ā€” if we ship the wrong architecture and discover the field is empty at slice 3, we waste significant work.
      recommended: hard-blocker
      options:
        - key: hard-blocker
          label: 'A: Hard blocker ā€” slice 1 must produce non-empty source evidence before slice 2 can start. Safest, slightly slower'
        - key: parallel-verification
          label: 'B: Parallel verification ā€” slice 2 starts while slice 1 runs concurrently. Faster but risks rework if verification fails'
        - key: trust-struct-field
          label: 'C: Trust the struct field exists for a reason ā€” skip slice 1 entirely and commit to slice 2 directly. Fastest, highest risk'
