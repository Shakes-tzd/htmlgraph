    - id: q-active-work-item-key
      text: Does active_work_items continue to key on (session_id, agent_id), or migrate to (logical_session_id, agent_id)?
      description: The `active_work_items` table from feat-ab67561e keys on `(session_id, agent_id)` today. This means parallel sittings in the SAME transcript share one active work item slot per agent ā€” the resume carries over whatever feature was active when the user left. Option (a) keeps the old key; a resumed session picks up the prior active work item, which matches user intuition for 'I'm continuing where I left off'. Option (b) switches to `(logical_session_id, agent_id)`; each sitting has its own independent slot, which matches the mental model of 'each sitting is a fresh start'. Option (a) is zero migration cost; option (b) is a breaking schema change requiring a migration of existing rows. Option (c) is a hybrid ā€” keep `session_id` as the primary key but add `logical_session_id` as an informational column for future queries, without changing lookup semantics. This is the lowest-risk path.
      recommended: hybrid-informational
      options:
