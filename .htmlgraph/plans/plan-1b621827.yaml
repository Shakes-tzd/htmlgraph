        - key: migrate-to-logical
          label: 'B: Migrate to (logical_session_id, agent_id); each sitting has its own independent slot ā€” matches mental model but breaking change'
        - key: hybrid-informational
          label: 'C: Keep (session_id, agent_id) as the key, add logical_session_id as an informational column for future queries ā€” zero migration, forward-compatible'
